<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Heart</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w = 0, h = 0, cx = 0, cy = 0, dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = w / 2;
  cy = h / 2;
}
resize();
window.addEventListener('resize', resize);

function heartPoint(t, scale=1) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  return {
    x: x * scale,
    y: -y * scale
  };
}

class Particle {
  constructor(type='heart') {
    this.type = type;
    this.reset();
  }

  reset() {
    this.t = Math.random() * Math.PI * 2;
    this.r = Math.random();
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.5 + Math.random() * 1.5;
    this.size = 1 + Math.random() * 2.2;

    if (this.type === 'heart') {
      const p = heartPoint(this.t, 11 + Math.random() * 8);
      const spread = Math.pow(Math.random(), 1.8);
      this.baseX = p.x * (0.55 + spread * 0.55);
      this.baseY = p.y * (0.55 + spread * 0.55);
      this.wobble = 2 + Math.random() * 6;
      this.alphaBase = 0.35 + Math.random() * 0.45;
    } else {
      const ang = Math.random() * Math.PI * 2;
      const dist = 120 + Math.random() * 180;
      this.baseX = Math.cos(ang) * dist;
      this.baseY = Math.sin(ang) * dist * 0.9;
      this.wobble = 8 + Math.random() * 16;
      this.alphaBase = 0.08 + Math.random() * 0.18;
      this.size = 0.8 + Math.random() * 2.0;
    }
  }

  draw(time, beatScale) {
    const dx = Math.cos(time * this.speed + this.phase) * this.wobble;
    const dy = Math.sin(time * this.speed + this.phase) * this.wobble;

    const x = cx + (this.baseX * beatScale) + dx;
    const y = cy + (this.baseY * beatScale) + dy;

    let alpha = this.alphaBase + 0.25 * (0.5 + 0.5 * Math.sin(time * 3 + this.phase));
    if (this.type !== 'heart') alpha *= 0.8;

    const glow = 4 + this.size * 3;

    ctx.beginPath();
    ctx.fillStyle = `rgba(255, 40, 140, ${alpha})`;
    ctx.shadowColor = 'rgba(255, 20, 120, 0.9)';
    ctx.shadowBlur = glow;
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

const heartParticles = [];
const outerParticles = [];
const outlineParticles = [];

for (let i = 0; i < 3200; i++) heartParticles.push(new Particle('heart'));
for (let i = 0; i < 1600; i++) outerParticles.push(new Particle('outer'));

for (let i = 0; i < 900; i++) {
  const t = (i / 900) * Math.PI * 2;
  const p = heartPoint(t, 19 + Math.random() * 1.5);
  outlineParticles.push({
    x: p.x,
    y: p.y,
    size: 1.2 + Math.random() * 1.6,
    phase: Math.random() * Math.PI * 2,
    speed: 0.8 + Math.random() * 1.6,
    wobble: 1 + Math.random() * 3
  });
}

function drawOutline(time, beatScale) {
  for (const p of outlineParticles) {
    const dx = Math.cos(time * p.speed + p.phase) * p.wobble;
    const dy = Math.sin(time * p.speed + p.phase) * p.wobble;
    const x = cx + p.x * beatScale + dx;
    const y = cy + p.y * beatScale + dy;

    const alpha = 0.6 + 0.35 * (0.5 + 0.5 * Math.sin(time * 4 + p.phase));
    ctx.beginPath();
    ctx.fillStyle = `rgba(255, 220, 240, ${alpha})`;
    ctx.shadowColor = 'rgba(255, 80, 170, 1)';
    ctx.shadowBlur = 10;
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBackgroundGlow(beatScale) {
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 280 * beatScale);
  grad.addColorStop(0, 'rgba(255, 30, 120, 0.10)');
  grad.addColorStop(0.4, 'rgba(255, 20, 100, 0.06)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

function animate(ms) {
  const time = ms * 0.001;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, w, h);

  const beat = Math.pow(Math.sin(time * 2.6) * 0.5 + 0.5, 3);
  const beatScale = 1 + beat * 0.12;

  drawBackgroundGlow(beatScale);

  ctx.globalCompositeOperation = 'lighter';

  for (const p of outerParticles) p.draw(time, beatScale);
  for (const p of heartParticles) p.draw(time, beatScale);
  drawOutline(time, beatScale);

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
