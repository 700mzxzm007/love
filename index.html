<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Heart</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b1023 0%, #09060d 55%, #000 100%);
            touch-action: manipulation;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .tip {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 28px;
            text-align: center;
            color: rgba(255,255,255,.78);
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(255,120,170,.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tip">LOVE</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w = 0, h = 0, cx = 0, cy = 0, unit = 1, DPR = 1;

    function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * DPR;
        canvas.height = h * DPR;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        cx = w / 2;
        cy = h / 2 - 20;
        unit = Math.min(w, h) / 38;
    }
    resize();
    window.addEventListener('resize', resize);

    function heart(t, s = 1) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        return { x: x * unit * s, y: -y * unit * s };
    }

    const particles = Array.from({ length: 900 }, () => ({
        t: Math.random() * Math.PI * 2,
        r: 0.72 + Math.random() * 0.42,
        size: 0.8 + Math.random() * 2.8,
        phase: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 2.2,
        drift: 1 + Math.random() * 4
    }));

    const sparks = Array.from({ length: 90 }, () => ({
        a: Math.random() * Math.PI * 2,
        d: Math.random() * 26,
        size: 0.8 + Math.random() * 2.5,
        phase: Math.random() * Math.PI * 2
    }));

    const tapHearts = [];

    function drawGlowRing(scale, alpha) {
        ctx.beginPath();
        for (let i = 0; i <= 240; i++) {
            const p = heart((i / 240) * Math.PI * 2, scale);
            const x = cx + p.x;
            const y = cy + p.y;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(255,70,140,${alpha})`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'rgba(255,80,160,.9)';
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    function drawParticle(x, y, size, alpha) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, ${80 + Math.random() * 80}, ${150 + Math.random() * 60}, ${alpha})`;
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
    }

    function animate(time) {
        const t = time * 0.001;
        const beat = 1 + 0.08 * Math.sin(t * 3.4);

        ctx.clearRect(0, 0, w, h);

        const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.7);
        bg.addColorStop(0, 'rgba(40,12,32,0.35)');
        bg.addColorStop(0.5, 'rgba(9,6,13,0.2)');
        bg.addColorStop(1, 'rgba(0,0,0,0.15)');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        for (let i = 5; i >= 1; i--) {
            drawGlowRing(beat * (1 + i * 0.018), 0.025 * i);
        }

        for (const p of particles) {
            const hp = heart(p.t, beat * p.r);
            const dx = Math.cos(t * p.speed + p.phase) * p.drift;
            const dy = Math.sin(t * p.speed + p.phase) * p.drift;
            const alpha = 0.35 + 0.5 * (0.5 + 0.5 * Math.sin(t * 3 + p.phase));
            drawParticle(cx + hp.x + dx, cy + hp.y + dy, p.size, alpha);
        }

        ctx.beginPath();
        for (let i = 0; i <= 360; i++) {
            const p = heart((i / 360) * Math.PI * 2, beat);
            const x = cx + p.x;
            const y = cy + p.y;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();

        const grad = ctx.createLinearGradient(cx, cy - 180, cx, cy + 200);
        grad.addColorStop(0, '#ff7aa8');
        grad.addColorStop(0.5, '#ff3d7a');
        grad.addColorStop(1, '#ff155f');
        ctx.fillStyle = grad;
        ctx.shadowBlur = 30;
        ctx.shadowColor = 'rgba(255,70,150,.85)';
        ctx.fill();
        ctx.shadowBlur = 0;

        for (const s of sparks) {
            const x = cx + Math.cos(s.a + t) * s.d;
            const y = cy + Math.sin(s.a + t * 1.2) * s.d;
            const alpha = 0.25 + 0.65 * (0.5 + 0.5 * Math.sin(t * 4 + s.phase));
            drawParticle(x, y, s.size, alpha);
        }

        ctx.save();
        ctx.textAlign = 'center';
        ctx.font = `bold ${Math.max(28, Math.min(w, h) / 15)}px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,.92)';
        ctx.shadowBlur = 18;
        ctx.shadowColor = 'rgba(255,120,170,.8)';
        ctx.fillText('LOVE', cx, cy + unit * 19);
        ctx.restore();

        for (let i = tapHearts.length - 1; i >= 0; i--) {
            const th = tapHearts[i];
            th.y -= th.vy;
            th.x += Math.sin(th.life * 0.2 + th.seed) * 0.8;
            th.life++;
            const a = 1 - th.life / th.maxLife;
            const s = th.size * (1 + th.life / th.maxLife);
            ctx.save();
            ctx.globalAlpha = Math.max(a, 0);
            ctx.fillStyle = th.color;
            ctx.beginPath();
            for (let j = 0; j <= 80; j++) {
                const p = heart((j / 80) * Math.PI * 2, s / 16);
                const x = th.x + p.x;
                const y = th.y + p.y;
                if (j === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            if (th.life >= th.maxLife) tapHearts.splice(i, 1);
        }

        requestAnimationFrame(animate);
    }

    function spawnHearts(x, y) {
        for (let i = 0; i < 8; i++) {
            tapHearts.push({
                x,
                y,
                vy: 1 + Math.random() * 1.8,
                life: 0,
                maxLife: 45 + Math.random() * 20,
                size: 0.18 + Math.random() * 0.18,
                seed: Math.random() * Math.PI * 2,
                color: `rgba(255, ${80 + Math.random() * 100}, ${140 + Math.random() * 80}, 1)`
            });
        }
    }

    window.addEventListener('pointerdown', e => {
        spawnHearts(e.clientX, e.clientY);
    });

    requestAnimationFrame(animate);
</script>
</body>
</html>
